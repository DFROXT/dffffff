<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᴀɴᴏɴʏᴍᴏᴜs · ɪᴠᴀsᴍs</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0b0f;
            color: #aaffdd;
            font-family: 'Orbitron', 'Segoe UI', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }
        /* glow background */
        .glow {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, #00ffff08 0%, transparent 70%);
            animation: rotate 60s linear infinite;
            z-index: -1;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .container {
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        .header {
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 4rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 0 0 30px cyan;
            font-weight: 900;
            line-height: 1.2;
            word-break: break-word;
        }
        .header p {
            font-size: 1.2rem;
            color: #77ddff;
            letter-spacing: 5px;
            margin-top: -10px;
            font-variant: small-caps;
        }
        .small-caps {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            font-variant: small-caps;
        }
        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin: 50px 0;
        }
        .stat-card {
            background: rgba(0, 30, 40, 0.5);
            border: 2px solid #0ff3;
            border-radius: 30px;
            padding: 35px 25px;
            min-width: 220px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px #00ffff33;
            transition: all 0.3s;
        }
        .stat-card:hover {
            border-color: cyan;
            box-shadow: 0 0 60px cyan;
            transform: translateY(-5px);
        }
        .stat-card .value {
            font-size: 5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px cyan;
            line-height: 1;
            font-family: 'Orbitron', monospace;
        }
        .stat-card .label {
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: #88ddff;
            text-transform: lowercase;
            font-variant: small-caps;
        }
        .footer {
            margin-top: 60px;
            font-size: 0.9rem;
            color: #446688;
        }
        .footer b {
            color: #88ddff;
            font-weight: 900;
            text-transform: lowercase;
            font-variant: small-caps;
            font-size: 1.2rem;
        }
        .unicap {
            font-family: 'Orbitron', 'Arial Unicode MS', sans-serif;
        }
        /* small-caps unicode style for special texts */
        .unicap-text {
            text-transform: lowercase;
            font-variant: small-caps;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <div class="header">
            <h1>ᴀɴᴏɴʏᴍᴏᴜs</h1>
            <p class="small-caps">ɪᴠᴀsᴍs ɢᴀᴛᴇᴡᴀʏ</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="nodes">000</div>
                <div class="label">ɴᴏᴅᴇs ᴏɴʟɪɴᴇ</div>
            </div>
            <div class="stat-card">
                <div class="value" id="logs">000</div>
                <div class="label">ʟᴏɢs ᴄᴀᴘᴛᴜʀᴇᴅ</div>
            </div>
        </div>

        <div class="footer">
            ᴘᴏᴡᴇʀᴇᴅ ʙʏ <b>ᴀɴᴏɴʏᴍᴏᴜs</b>
        </div>
    </div>

    <script>
        async function updateStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('nodes').innerText = data.nodes.toString().padStart(3, '0');
                document.getElementById('logs').innerText = data.logs.toString().padStart(3, '0');
            } catch (e) {
                console.error('Stats fetch error', e);
            }
        }
        setInterval(updateStats, 5000);
        updateStats();
    </script>
</body>
</html>
