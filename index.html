<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANONYMOUS | ALPHA COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            color: #00f5ff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0015ff22 0%, transparent 70%);
            z-index: -1;
        }
        .container {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .profile-box {
            position: relative; padding: 10px; border-radius: 50%;
            background: linear-gradient(45deg, #00f5ff, #0080ff);
            box-shadow: 0 0 50px rgba(0, 245, 255, 0.4);
            margin-bottom: 20px;
        }
        .profile-img {
            width: 150px; height: 150px; border-radius: 50%; border: 5px solid #050505;
            background: #000; display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-size: 50px;
        }
        h1 {
            font-family: 'Orbitron'; font-size: 40px; letter-spacing: 15px;
            text-shadow: 0 0 20px #00f5ff; margin-bottom: 10px;
        }
        .subtitle { font-size: 18px; color: #888; letter-spacing: 5px; text-transform: uppercase; }
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; width: 80%; max-width: 500px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid #00f5ff33;
            padding: 20px; border-radius: 15px; text-align: center;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .stat-card:hover { border-color: #00f5ff; box-shadow: 0 0 20px #00f5ff33; }
        .stat-card h2 { font-family: 'Orbitron'; font-size: 24px; }
        .stat-card p { font-size: 14px; color: #aaa; text-transform: uppercase; }
        .footer { position: absolute; bottom: 30px; font-size: 14px; opacity: 0.6; }
        .footer b { color: #fff; text-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="profile-box">
            <div class="profile-img">A</div>
        </div>
        <h1>ANONYMOUS</h1>
        <p class="subtitle">SYSTEM INTERFACE | ALPHA</p>

        <div class="stats-grid">
            <div class="stat-card">
                <h2 id="nodes">000</h2>
                <p>Nodes Online</p>
            </div>
            <div class="stat-card">
                <h2 id="logs">000</h2>
                <p>Logs Captured</p>
            </div>
        </div>

        <div class="footer">
            POWERED BY <b>ANONYMOUS</b>
        </div>
    </div>

    <script>
        function updateStats() {
            fetch('/api/stats').then(res => res.json()).then(data => {
                document.getElementById('nodes').innerText = data.nodes.toString().padStart(3, '0');
                document.getElementById('logs').innerText = data.logs.toString().padStart(3, '0');
            });
        }
        setInterval(updateStats, 5000);
        updateStats();
    </script>
</body>
</html>
